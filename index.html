<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKN Media Center</title>
    
    <!-- PWA & Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>

    <style>
        /* Exact Typography to match RetroArch's default XMB font */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        :root {
            --ra-blue-light: #0072ff;
            --ra-blue-dark: #001e5c;
            --text-color: #ffffff;
            --transition-speed: 0.25s;
            --origin-x: 25vw;
            --origin-y: 28vh;
            --cat-spacing: 90px;
            --item-spacing: 65px;
        }

        html {
            background-color: #000; /* Absolute base fallback */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Lets the bg-animation show through */
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Subtle Animated Background --- */
        .bg-animation-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(120% 120% at 50% 0%, var(--ra-blue-light) 0%, var(--ra-blue-dark) 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: floatOrb 12s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .orb-1 { top: -10%; left: 5%; width: 40vw; height: 40vw; background: rgba(255, 255, 255, 0.15); animation-delay: 0s; }
        .orb-2 { bottom: -10%; right: 5%; width: 35vw; height: 35vw; background: rgba(0, 114, 255, 0.4); animation-delay: -3s; }
        .orb-3 { top: 40%; left: 60%; width: 25vw; height: 25vw; background: rgba(255, 255, 255, 0.1); animation-delay: -6s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }

        /* --- Top & Bottom Bars --- */
        .header-top-left { position: absolute; top: 30px; left: 40px; font-size: 1.4rem; letter-spacing: 0.5px; z-index: 10; }
        .header-top-right { position: absolute; top: 30px; right: 40px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; opacity: 0.9; z-index: 10; }
        .footer-bottom-left { position: absolute; bottom: 30px; left: 40px; font-size: 1rem; opacity: 0.8; z-index: 10; }

        /* --- XMB Layout System --- */
        .xmb-container { position: relative; height: 100vh; width: 100vw; overflow: hidden; }

        /* Horizontal Category Menu */
        .main-menu {
            position: absolute;
            top: var(--origin-y);
            left: var(--origin-x);
            display: flex;
            align-items: center;
            transition: transform var(--transition-speed) cubic-bezier(0.2, 0, 0.2, 1);
        }

        .menu-category {
            width: 64px; height: 64px;
            margin-right: calc(var(--cat-spacing) - 64px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0.7;
            transition: all var(--transition-speed) ease;
            transform-origin: center;
            border-radius: 18px; /* Squircle */
        }

        .menu-category svg {
            width: 32px; height: 32px;
            stroke: #fff; stroke-width: 1.5;
            transition: stroke var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        .menu-category.active {
            opacity: 1; background-color: #ffffff;
            transform: scale(1.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .menu-category.active svg { stroke: var(--ra-blue-light); stroke-width: 2; }

        /* Vertical Item Menu */
        .sub-menu {
            position: absolute;
            top: calc(var(--origin-y) + 110px);
            left: calc(var(--origin-x) - 10px);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed) cubic-bezier(0.2, 0, 0.2, 1);
        }

        .menu-item {
            height: var(--item-spacing);
            display: flex; align-items: flex-start; gap: 15px;
            opacity: 0.6; transition: all var(--transition-speed) ease;
            white-space: nowrap;
        }

        .menu-item.active { opacity: 1; }

        .item-icon { width: 24px; height: 24px; margin-top: 2px; }
        .item-icon svg { width: 100%; height: 100%; stroke: #fff; stroke-width: 1.5; }

        .item-text-container { display: flex; flex-direction: column; }
        .item-title { font-size: 1.3rem; letter-spacing: 0.5px; transition: font-size var(--transition-speed) ease; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .menu-item.active .item-title { font-size: 1.45rem; font-weight: 400; }

        .item-desc {
            font-size: 0.9rem; opacity: 0; max-height: 0; overflow: hidden;
            margin-top: 5px; color: rgba(255, 255, 255, 0.8);
            transition: opacity var(--transition-speed) ease;
        }
        .menu-item.active .item-desc { opacity: 1; max-height: 50px; }

        /* Modal Overlays */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--ra-blue-light) 0%, var(--ra-blue-dark) 100%);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px; border-radius: 12px; width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .modal-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 15px; border-radius: 6px; margin-top: 8px; margin-bottom: 20px;
            font-family: inherit; font-size: 1rem; outline: none;
        }
        .modal-input:focus { border-color: white; }

        /* Netflix-style Range Slider */
        .netflix-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: height 0.2s;
        }
        .netflix-slider:hover { height: 8px; }
        .netflix-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            transition: transform 0.2s;
            transform: scale(0);
        }
        .netflix-slider:hover::-webkit-slider-thumb {
            transform: scale(1);
        }

        /* Lume Subtitle Custom Engine */
        .lume-subtitles {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            color: #ffffff;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0px 2px 0 #000, 2px 0px 0 #000, 0px -2px 0 #000, -2px 0px 0 #000;
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            z-index: 40;
        }
        video::-webkit-media-text-track-display, ::cue {
            display: none !important;
            color: transparent;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="bg-animation-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, useLayoutEffect } = React;

        // --- Utils & Parsers ---
        const genId = () => Math.random().toString(36).substring(2, 9) + Date.now().toString(36);

        const parseM3U = (text) => {
            const lines = text.split(/\r?\n/);
            const channels = [];
            let currentChannel = null;
            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                if (line.startsWith('#EXTINF:')) {
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    const nameParts = line.split(',');
                    const nameMatch = nameParts[nameParts.length - 1];
                    currentChannel = {
                        id: genId(),
                        name: nameMatch ? nameMatch.trim() : 'Unknown Channel',
                        group: groupMatch ? groupMatch[1] : 'Uncategorized',
                    };
                } else if (!line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            });
            return channels;
        };

        const formatTime = (seconds) => {
            if (isNaN(seconds)) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        const srtToVtt = (srtContent) => {
            let vtt = 'WEBVTT\n\n';
            vtt += srtContent.replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2');
            return vtt;
        };

        // --- ICONS ---
        const ICONS = {
            search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            star: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            folder: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
            list: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" strokeDasharray="3 3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            gear: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-2.82.11 1.65 1.65 0 0 0-.11 2.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1.15-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1.15H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1.15z"/></svg>,
            play: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            pause: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            fileVideo: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m10 11 5 3-5 3v-6z"/></svg>,
            trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            eyeOff: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>,
            arrowLeft: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            skipBack: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>,
            skipForward: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>,
            rewind10: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 17l-5-5 5-5"/><path d="M18 17l-5-5 5-5"/></svg>,
            forward10: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 17l5-5-5-5"/><path d="M6 17l5-5-5-5"/></svg>,
            volOn: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            volOff: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="1" x2="1" y2="23"/></svg>,
            fullscreen: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>,
            subtitles: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"/><line x1="7" y1="15" x2="11" y2="15"/><line x1="13" y1="15" x2="17" y2="15"/><line x1="7" y1="11" x2="17" y2="11"/></svg>,
            speed: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        };

        // --- Status Bar Component ---
        const StatusBar = ({ title }) => {
            const [time, setTime] = useState('');
            const [battery, setBattery] = useState('100%');

            useEffect(() => {
                const updateTime = () => {
                    const now = new Date();
                    const day = String(now.getDate()).padStart(2, '0');
                    const month = String(now.getMonth() + 1).padStart(2, '0');
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    setTime(`${day}/${month} ${hours}:${minutes}`);
                };
                updateTime();
                const timer = setInterval(updateTime, 60000);

                if (navigator.getBattery) {
                    navigator.getBattery().then(batt => {
                        const updateBatt = () => setBattery(`${Math.round(batt.level * 100)}%`);
                        updateBatt();
                        batt.addEventListener('levelchange', updateBatt);
                    });
                }
                return () => clearInterval(timer);
            }, []);

            return (
                <>
                    <div className="header-top-left">{title}</div>
                    <div className="header-top-right">
                        <span>{time}</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <span style={{marginLeft: '5px'}}>{battery}</span>
                        <svg width="14" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="6" y="4" width="12" height="16" rx="2" ry="2"></rect><line x1="10" y1="2" x2="14" y2="2"></line><line x1="12" y1="9" x2="12" y2="15"></line></svg>
                    </div>
                    <div className="footer-bottom-left">TKN Media Center - RetroArch Edition</div>
                </>
            );
        };

        // --- IPTV Player Component (Original FlameTV Top-Overlay) ---
        const IPTVPlayerView = ({ channel, onBack, onNext, onPrev, onFavToggle, onHideToggle, isFav, isHidden }) => {
            const videoRef = useRef(null);
            const [loading, setLoading] = useState(true);
            const [stats, setStats] = useState({ res: '', fps: '' });
            const [controlsVisible, setControlsVisible] = useState(true);

            useEffect(() => {
                let timeout;
                const showControls = () => {
                    setControlsVisible(true);
                    clearTimeout(timeout);
                    timeout = setTimeout(() => setControlsVisible(false), 4000);
                };
                window.addEventListener('mousemove', showControls);
                window.addEventListener('keydown', showControls);
                showControls();
                return () => {
                    window.removeEventListener('mousemove', showControls);
                    window.removeEventListener('keydown', showControls);
                    clearTimeout(timeout);
                };
            }, []);

            useEffect(() => {
                let hls;
                if (!videoRef.current) return;
                setLoading(true);
                setStats({ res: '', fps: '' });

                const startPlayback = () => {
                    if (window.Hls.isSupported()) {
                        hls = new window.Hls();
                        hls.loadSource(channel.url);
                        hls.attachMedia(videoRef.current);
                        
                        hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
                            setLoading(false);
                            if (videoRef.current) {
                                const p = videoRef.current.play();
                                if (p !== undefined) p.catch(e => { if (e.name !== 'AbortError') console.warn('Playback prevented:', e); });
                            }
                        });

                        hls.on(window.Hls.Events.LEVEL_SWITCHED, (event, data) => {
                            const level = hls.levels[data.level];
                            if (level) {
                                setStats({ 
                                    res: level.height ? `${level.height}p` : '', 
                                    fps: level.frameRate ? `${Math.round(level.frameRate)} fps` : '' 
                                });
                            }
                        });
                    } else if (videoRef.current.canPlayType('application/vnd.apple.mpegurl')) {
                        videoRef.current.src = channel.url;
                        videoRef.current.addEventListener('loadedmetadata', () => {
                            setLoading(false);
                            if (videoRef.current) {
                                const p = videoRef.current.play();
                                if (p !== undefined) p.catch(e => { if (e.name !== 'AbortError') console.warn('Playback prevented:', e); });
                            }
                        });
                        videoRef.current.addEventListener('resize', () => {
                            setStats({ res: `${videoRef.current.videoHeight}p`, fps: '' });
                        });
                    }
                };

                startPlayback();
                return () => { if (hls) hls.destroy(); };
            }, [channel]);

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Escape' || e.key === 'Backspace' || e.key === 'b') {
                        onBack();
                    } else if (e.key === ' ' || e.key === 'Enter') {
                        if (videoRef.current && videoRef.current.paused) {
                            const p = videoRef.current.play();
                            if (p !== undefined) p.catch(err => { if (err.name !== 'AbortError') console.warn('Playback error:', err); });
                        } else if (videoRef.current) {
                            videoRef.current.pause();
                        }
                    } else if (e.key === 'ArrowRight') {
                        onNext();
                    } else if (e.key === 'ArrowLeft') {
                        onPrev();
                    } else if (e.key.toLowerCase() === 'f') {
                        onFavToggle();
                    } else if (e.key === 'Delete') {
                        onHideToggle();
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [onBack, onNext, onPrev, onFavToggle, onHideToggle]);

            return (
                <div className={`fixed inset-0 bg-black z-[100] flex flex-col ${!controlsVisible ? 'cursor-none' : ''}`}>
                    {loading && <div className="absolute inset-0 flex items-center justify-center text-white z-50">Buffering...</div>}
                    <video ref={videoRef} className="w-full h-full object-contain" autoPlay playsInline />
                    
                    <div className={`absolute inset-x-0 top-0 bg-gradient-to-b from-black/95 via-black/60 to-transparent p-10 pt-12 flex justify-between items-start transition-opacity duration-500 pointer-events-none ${controlsVisible ? 'opacity-100' : 'opacity-0'}`}>
                        <div className="pointer-events-auto">
                            <button onClick={onBack} className="flex items-center text-white/70 hover:text-white mb-6 transition-colors">
                                <span className="w-8 h-8 mr-2">{ICONS.arrowLeft}</span> 
                                <span className="text-xl font-bold">Back</span>
                            </button>
                            <h2 className="text-4xl font-light text-white tracking-tight mb-3">{channel.name}</h2>
                            <div className="flex items-center space-x-4">
                                <span className="text-blue-400 font-bold text-sm uppercase tracking-widest bg-blue-900/30 px-3 py-1 rounded-md">{channel.group || 'Live Stream'}</span>
                                <button onClick={onPrev} className="flex items-center space-x-2 text-white/50 hover:text-white bg-white/10 px-3 py-1 rounded-md text-sm font-semibold transition-colors">
                                    <span className="w-4 h-4">{ICONS.skipBack}</span> <span>Prev</span>
                                </button>
                                <button onClick={onNext} className="flex items-center space-x-2 text-white/50 hover:text-white bg-white/10 px-3 py-1 rounded-md text-sm font-semibold transition-colors">
                                    <span>Next</span> <span className="w-4 h-4">{ICONS.skipForward}</span>
                                </button>
                            </div>
                        </div>

                        <div className="flex items-center space-x-4 pointer-events-auto mt-8">
                            <button onClick={onFavToggle} className={`flex items-center space-x-2 px-4 py-2.5 rounded-xl border border-white/10 transition-colors ${isFav ? 'bg-blue-600/80 text-white' : 'bg-white/10 text-white/70 hover:bg-white/20'}`}>
                                <span className={`w-5 h-5 ${isFav ? 'fill-current' : ''}`}>{ICONS.star}</span>
                                <span className="font-bold text-sm tracking-wide">{isFav ? 'Favorited' : 'Favorite (F)'}</span>
                            </button>
                            <button onClick={onHideToggle} className={`flex items-center space-x-2 px-4 py-2.5 rounded-xl border border-white/10 transition-colors ${isHidden ? 'bg-red-500/80 text-white' : 'bg-white/10 text-white/70 hover:bg-white/20'}`}>
                                <span className="w-5 h-5">{ICONS.eyeOff}</span>
                                <span className="font-bold text-sm tracking-wide">{isHidden ? 'Restore (Del)' : 'Hide (Del)'}</span>
                            </button>
                            
                            {stats.res && (
                                <div className="flex items-center space-x-3 text-white/90 bg-white/10 px-4 py-2.5 rounded-xl border border-white/10 ml-2 font-bold tracking-wider">
                                    <span>{stats.res}</span>
                                    {stats.fps && <span className="font-light opacity-70">| {stats.fps}</span>}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Local Media Player Component (Netflix-Style Bottom OSD + Lume Engine) ---
        const LocalPlayerView = ({ channel, onBack }) => {
            const videoRef = useRef(null);
            const containerRef = useRef(null);
            const fileInputRef = useRef(null);

            const [loading, setLoading] = useState(true);
            const [controlsVisible, setControlsVisible] = useState(true);
            const [osdMessage, setOsdMessage] = useState('');
            const osdTimerRef = useRef(null);
            const [stats, setStats] = useState({ res: '', fps: '' });
            
            // Playback State
            const [isPlaying, setIsPlaying] = useState(true);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [volume, setVolume] = useState(1);
            const [isMuted, setIsMuted] = useState(false);
            const [playbackRate, setPlaybackRate] = useState(1);
            
            // Custom Subtitle State tracked via React (prevents vDOM reconciliation destruction)
            const [currentSubtitleText, setCurrentSubtitleText] = useState('');
            const [subtitleUrl, setSubtitleUrl] = useState(null);

            // Lume Video Transform States
            const aspectRatios = ['Default', '16:9', '4:3', '1:1', '16:10', '2.21:1', '2.35:1', '2.39:1', '5:4'];
            const zoomModes = ['Fit Screen', 'Fill Screen', 'Original Size'];
            const [arIndex, setArIndex] = useState(0);
            const [cropIndex, setCropIndex] = useState(0);
            const [zoomIndex, setZoomIndex] = useState(0);
            const [customZoom, setCustomZoom] = useState(null);

            // Hide Controls Timer
            useEffect(() => {
                let timeout;
                const showControls = () => {
                    setControlsVisible(true);
                    clearTimeout(timeout);
                    if (isPlaying) timeout = setTimeout(() => setControlsVisible(false), 3000);
                };
                window.addEventListener('mousemove', showControls);
                showControls();
                return () => {
                    window.removeEventListener('mousemove', showControls);
                    clearTimeout(timeout);
                };
            }, [isPlaying]);

            // Show OSD Message (Refactored to avoid re-render loops in dependencies)
            const showOSD = useCallback((text) => {
                setOsdMessage(text);
                if (osdTimerRef.current) clearTimeout(osdTimerRef.current);
                osdTimerRef.current = setTimeout(() => setOsdMessage(''), 2000);
            }, []);

            // Load Video and Subtitles
            useEffect(() => {
                if (!videoRef.current) return;
                setLoading(true);
                setCurrentSubtitleText('');
                
                // Process auto-matched subtitle if present
                if (channel.pendingSubFile) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        let content = evt.target.result;
                        if (channel.pendingSubFile.name.toLowerCase().endsWith('.srt')) {
                            content = srtToVtt(content);
                        }
                        const blob = new Blob([content], { type: 'text/vtt' });
                        setSubtitleUrl(URL.createObjectURL(blob));
                        showOSD('Auto-loaded Subtitle');
                    };
                    reader.readAsText(channel.pendingSubFile);
                } else {
                    setSubtitleUrl(null);
                }

                videoRef.current.src = channel.url;
                const p = videoRef.current.play();
                if (p !== undefined) {
                    p.catch(e => {
                        if (e.name !== 'AbortError') console.warn('Autoplay prevented or unsupported media', e);
                        setLoading(false);
                    });
                }
            }, [channel, showOSD]); 

            // Controls Handlers
            const togglePlay = () => { 
                if (videoRef.current.paused) {
                    const p = videoRef.current.play();
                    if (p !== undefined) p.catch(e => { if (e.name !== 'AbortError') console.warn(e); });
                } else {
                    videoRef.current.pause(); 
                }
            };
            const toggleFullscreen = () => {
                if (!document.fullscreenElement) containerRef.current.requestFullscreen().catch(err => console.log(err));
                else document.exitFullscreen();
            };
            const toggleMute = () => {
                videoRef.current.muted = !videoRef.current.muted;
                setIsMuted(videoRef.current.muted);
                showOSD(videoRef.current.muted ? 'Muted' : 'Unmuted');
            };
            const changeVolume = (delta) => {
                const newVol = Math.max(0, Math.min(1, videoRef.current.volume + delta));
                videoRef.current.volume = newVol;
                videoRef.current.muted = false;
                setVolume(newVol);
                setIsMuted(false);
                showOSD(`Volume: ${Math.round(newVol * 100)}%`);
            };
            const changeSpeed = (delta) => {
                const newSpeed = Math.max(0.25, Math.min(4.0, videoRef.current.playbackRate + delta));
                videoRef.current.playbackRate = newSpeed;
                setPlaybackRate(newSpeed);
                showOSD(`Speed: ${newSpeed}x`);
            };

            // --- LUME KEYBOARD ENGINE & SUBTITLE NAVIGATION ---
            useEffect(() => {
                const doNavigateSubtitles = (direction) => {
                    const video = videoRef.current;
                    if (!video) return;
                    const tracks = video.textTracks;
                    if (!tracks || tracks.length === 0) return;

                    let track = null;
                    for (let i = 0; i < tracks.length; i++) {
                        if (tracks[i].mode === 'hidden' || tracks[i].mode === 'showing') {
                            track = tracks[i];
                            break;
                        }
                    }

                    if (!track || !track.cues || track.cues.length === 0) {
                        showOSD("No Subtitles Loaded");
                        return;
                    }

                    const currentT = video.currentTime;
                    let targetTime = -1;

                    if (direction === 'next') {
                        for (let i = 0; i < track.cues.length; i++) {
                            if (track.cues[i].startTime > currentT + 0.1) {
                                targetTime = track.cues[i].startTime;
                                break;
                            }
                        }
                    } else if (direction === 'prev') {
                        for (let i = track.cues.length - 1; i >= 0; i--) {
                            if (track.cues[i].startTime < currentT - 0.5) {
                                targetTime = track.cues[i].startTime;
                                break;
                            }
                        }
                    }

                    if (targetTime !== -1) {
                        video.currentTime = targetTime;
                        showOSD(direction === 'next' ? 'Next Subtitle' : 'Prev Subtitle');
                    }
                };

                const handleKey = (e) => {
                    if (e.target.tagName.toLowerCase() === 'input' && e.target.type !== 'range') return;
                    
                    if (e.key === 'Escape' || e.key === 'Backspace' || e.key === 'b') {
                        if (document.fullscreenElement) document.exitFullscreen();
                        else onBack();
                        return;
                    }

                    const video = videoRef.current;
                    if (!video) return;

                    // Alt Shortcuts for Manual Zoom
                    if (e.altKey) {
                        if (e.key === '=' || e.key === '+') {
                            e.preventDefault();
                            setCustomZoom(prev => {
                                const newZoom = (prev === null ? 1 : prev) + 0.1;
                                showOSD(`Zoom: ${Math.round(newZoom * 100)}%`);
                                return newZoom;
                            });
                            return;
                        }
                        if (e.key === '-') {
                            e.preventDefault();
                            setCustomZoom(prev => {
                                const newZoom = Math.max(0.1, (prev === null ? 1 : prev) - 0.1);
                                showOSD(`Zoom: ${Math.round(newZoom * 100)}%`);
                                return newZoom;
                            });
                            return;
                        }
                    }

                    switch(e.key.toLowerCase()) {
                        case ' ':
                            e.preventDefault();
                            togglePlay();
                            break;
                        case 'f':
                            e.preventDefault();
                            toggleFullscreen();
                            break;
                        case 't':
                            e.preventDefault(); 
                            toggleFullscreen(); 
                            break;
                        case 'z':
                            e.preventDefault();
                            setCustomZoom(null);
                            setZoomIndex(p => {
                                const next = (p + 1) % zoomModes.length;
                                showOSD(`Zoom: ${zoomModes[next]}`);
                                return next;
                            });
                            break;
                        case 'a':
                            e.preventDefault();
                            setArIndex(p => {
                                const next = (p + 1) % aspectRatios.length;
                                showOSD(`Aspect Ratio: ${aspectRatios[next]}`);
                                return next;
                            });
                            break;
                        case 'c':
                            e.preventDefault();
                            setCropIndex(p => {
                                const next = (p + 1) % aspectRatios.length;
                                showOSD(`Crop: ${aspectRatios[next]}`);
                                return next;
                            });
                            break;
                        case 'm':
                            e.preventDefault();
                            toggleMute();
                            break;
                        case ']':
                            e.preventDefault();
                            changeSpeed(0.25);
                            break;
                        case '[':
                            e.preventDefault();
                            changeSpeed(-0.25);
                            break;
                        case 'arrowright':
                            e.preventDefault();
                            if (e.ctrlKey) doNavigateSubtitles('next');
                            else { video.currentTime = Math.min(video.currentTime + 10, video.duration); showOSD('+10s'); }
                            break;
                        case 'arrowleft':
                            e.preventDefault();
                            if (e.ctrlKey) doNavigateSubtitles('prev');
                            else { video.currentTime = Math.max(video.currentTime - 10, 0); showOSD('-10s'); }
                            break;
                        case 'arrowup':
                            e.preventDefault();
                            changeVolume(0.05);
                            break;
                        case 'arrowdown':
                            e.preventDefault();
                            changeVolume(-0.05);
                            break;
                    }
                };

                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [onBack, showOSD]); // showOSD is now stable, customZoom removed as a direct dependency using functional updates

            // Video Event Listeners
            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;
                
                const onTimeUpdate = () => {
                    setCurrentTime(video.currentTime);
                    
                    // Subtitle extraction logic mapping to our custom renderer overlay
                    let activeTrack = null;
                    if (video.textTracks) {
                        for (let i = 0; i < video.textTracks.length; i++) {
                            // Suppress browser native subtitles but keep cues active for processing
                            if (video.textTracks[i].mode === 'showing') {
                                video.textTracks[i].mode = 'hidden';
                            }
                            if (video.textTracks[i].mode === 'hidden') {
                                activeTrack = video.textTracks[i];
                                break;
                            }
                        }
                    }

                    let newText = '';
                    if (activeTrack && activeTrack.activeCues && activeTrack.activeCues.length > 0) {
                        for(let i = 0; i < activeTrack.activeCues.length; i++) {
                            newText += activeTrack.activeCues[i].text.replace(/\n/g, '<br>') + (i < activeTrack.activeCues.length - 1 ? '<br>' : '');
                        }
                    }

                    setCurrentSubtitleText(newText);
                };

                const updateStats = () => {
                    if (videoRef.current && videoRef.current.videoHeight) {
                        setStats({ res: `${videoRef.current.videoHeight}p`, fps: '' }); 
                    }
                };

                const onLoadedMetadata = () => {
                    setDuration(video.duration);
                    updateStats();
                    setLoading(false); // Dismiss loading overlay so video isn't blocked behind it
                };

                const onCanPlay = () => setLoading(false);

                const onPlaying = () => {
                    setIsPlaying(true); 
                    setLoading(false);
                    showOSD('Play'); 
                };

                const onPause = () => {
                    setIsPlaying(false);
                    showOSD('Pause');
                };
                
                video.addEventListener('timeupdate', onTimeUpdate);
                video.addEventListener('loadedmetadata', onLoadedMetadata);
                video.addEventListener('canplay', onCanPlay);
                video.addEventListener('playing', onPlaying);
                video.addEventListener('pause', onPause);
                video.addEventListener('resize', updateStats);

                return () => {
                    video.removeEventListener('timeupdate', onTimeUpdate);
                    video.removeEventListener('loadedmetadata', onLoadedMetadata);
                    video.removeEventListener('canplay', onCanPlay);
                    video.removeEventListener('playing', onPlaying);
                    video.removeEventListener('pause', onPause);
                    video.removeEventListener('resize', updateStats);
                };
            }, [showOSD]);

            const handleSubtitleUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !videoRef.current) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    let content = evt.target.result;
                    if (file.name.toLowerCase().endsWith('.srt')) content = srtToVtt(content);
                    const blob = new Blob([content], { type: 'text/vtt' });
                    setSubtitleUrl(URL.createObjectURL(blob));
                    showOSD('Subtitle Loaded');
                };
                reader.readAsText(file);
            };

            // Calculate Lume Transform Styles
            const ar = aspectRatios[arIndex];
            const crop = aspectRatios[cropIndex];
            const zoomMode = zoomModes[zoomIndex];

            const getTransformStyles = () => {
                let cropStyle = { width: '100%', height: '100%', display: 'flex', justifyContent: 'center', alignItems: 'center', overflow: 'hidden', transition: 'transform 0.2s' };
                if (crop !== 'Default') {
                    const [cw, ch] = crop.split(':');
                    cropStyle.aspectRatio = `${cw}/${ch}`;
                    cropStyle.maxWidth = `calc(100vh * (${cw} / ${ch}))`;
                    cropStyle.maxHeight = `calc(100vw * (${ch} / ${cw}))`;
                }

                let arStyle = { display: 'flex', justifyContent: 'center', alignItems: 'center' };
                let videoObjFit = 'contain';
                
                if (ar === 'Default') {
                    arStyle.width = '100%'; arStyle.height = '100%';
                    arStyle.minWidth = '0'; arStyle.minHeight = '0'; // Fixes flexbox collapsing video height
                    videoObjFit = crop === 'Default' ? 'contain' : 'cover';
                } else {
                    const [aw, ah] = ar.split(':');
                    arStyle.aspectRatio = `${aw}/${ah}`;
                    videoObjFit = 'fill';
                    if (crop !== 'Default') {
                        arStyle.minWidth = '100%'; arStyle.minHeight = '100%';
                    } else {
                        arStyle.maxWidth = `calc(100vh * (${aw} / ${ah}))`;
                        arStyle.maxHeight = `calc(100vw * (${ah} / ${aw}))`;
                        arStyle.width = '100%'; arStyle.height = '100%';
                    }
                }

                let scale = 1;
                if (customZoom !== null) {
                    scale = customZoom;
                } else if (zoomMode === 'Fill Screen') {
                    scale = 1.35; 
                } else if (zoomMode === 'Original Size') {
                    scale = 1; 
                }
                cropStyle.transform = `scale(${scale})`;

                return { cropStyle, arStyle, videoObjFit };
            };

            const { cropStyle, arStyle, videoObjFit } = getTransformStyles();

            return (
                <div ref={containerRef} className={`fixed inset-0 bg-black z-[100] flex flex-col font-sans ${!controlsVisible ? 'cursor-none' : ''}`}>
                    {loading && <div className="absolute inset-0 flex items-center justify-center text-white z-50">Loading...</div>}
                    
                    {/* Transform Wrappers (Lume Engine) */}
                    <div className="flex-1 w-full h-full flex items-center justify-center overflow-hidden">
                        <div style={cropStyle}>
                            <div style={arStyle}>
                                <video ref={videoRef} className="w-full h-full" style={{ objectFit: videoObjFit }} preload="auto" playsInline autoPlay onClick={togglePlay}>
                                    {subtitleUrl && <track kind="subtitles" label="Local Subs" src={subtitleUrl} default />}
                                </video>
                            </div>
                        </div>
                    </div>

                    {/* Subtitle Overlay */}
                    {currentSubtitleText && (
                        <div className="lume-subtitles" dangerouslySetInnerHTML={{ __html: currentSubtitleText }} />
                    )}

                    {/* OSD Center Notification */}
                    <div className={`absolute top-10 right-10 text-white font-bold text-2xl drop-shadow-md transition-opacity duration-300 pointer-events-none z-50 ${osdMessage ? 'opacity-100' : 'opacity-0'}`}>
                        {osdMessage}
                    </div>

                    {/* Netflix-Style OSD Top Bar with Title and Stats */}
                    <div className={`absolute top-0 left-0 w-full px-8 py-6 bg-gradient-to-b from-black/90 to-transparent flex items-start justify-between transition-opacity duration-500 z-50 ${controlsVisible ? 'opacity-100' : 'opacity-0'}`}>
                        <div className="flex items-center">
                            <button onClick={onBack} className="text-white hover:scale-110 transition-transform p-2 mr-6">
                                <span className="w-8 h-8 block">{ICONS.arrowLeft}</span>
                            </button>
                            <h2 className="text-3xl font-light text-white tracking-tight drop-shadow-md truncate max-w-4xl">{channel.name}</h2>
                        </div>
                        {stats.res && (
                            <div className="flex items-center space-x-3 text-white/90 bg-white/10 px-4 py-2.5 rounded-xl border border-white/10 font-bold tracking-wider shadow-lg">
                                <span>{stats.res}</span>
                                {stats.fps && <span className="font-light opacity-70">| {stats.fps}</span>}
                            </div>
                        )}
                    </div>

                    {/* Netflix-Style OSD Bottom Bar */}
                    <div className={`absolute bottom-0 left-0 w-full px-6 pb-6 pt-16 bg-gradient-to-t from-black/90 to-transparent transition-opacity duration-500 z-50 ${controlsVisible ? 'opacity-100' : 'opacity-0'}`}>
                        <input 
                            type="range" 
                            className="netflix-slider mb-4" 
                            min="0" max={duration || 100} value={currentTime} 
                            onChange={(e) => { videoRef.current.currentTime = e.target.value; setCurrentTime(e.target.value); }}
                            style={{ background: `linear-gradient(to right, #e50914 ${(currentTime/duration)*100}%, rgba(255,255,255,0.3) ${(currentTime/duration)*100}%)` }}
                        />
                        
                        <div className="flex justify-between items-center text-white">
                            <div className="flex items-center gap-6">
                                <button onClick={togglePlay} className="hover:scale-110 transition-transform">
                                    <span className="w-8 h-8 block">{isPlaying ? ICONS.pause : ICONS.play}</span>
                                </button>
                                <button onClick={() => { videoRef.current.currentTime -= 10; }} className="hover:scale-110 transition-transform">
                                    <span className="w-7 h-7 block">{ICONS.rewind10}</span>
                                </button>
                                <button onClick={() => { videoRef.current.currentTime += 10; }} className="hover:scale-110 transition-transform">
                                    <span className="w-7 h-7 block">{ICONS.forward10}</span>
                                </button>
                                <div className="flex items-center gap-2 group relative">
                                    <button onClick={toggleMute} className="hover:scale-110 transition-transform z-10">
                                        <span className="w-7 h-7 block">{isMuted || volume === 0 ? ICONS.volOff : ICONS.volOn}</span>
                                    </button>
                                    <div className="w-0 overflow-hidden group-hover:w-24 transition-all duration-300 ease-out flex items-center absolute left-8 h-full">
                                        <input type="range" min="0" max="1" step="0.05" value={isMuted ? 0 : volume} className="w-20 netflix-slider" onChange={(e) => changeVolume(e.target.value - volume)} />
                                    </div>
                                </div>
                                <span className="font-semibold text-sm opacity-90 tracking-wide ml-2">{formatTime(currentTime)} <span className="opacity-50 mx-1">/</span> {formatTime(duration)}</span>
                            </div>

                            <div className="flex items-center gap-6">
                                <input type="file" ref={fileInputRef} className="hidden" accept=".srt,.vtt" onChange={handleSubtitleUpload} />
                                <button onClick={() => fileInputRef.current.click()} title="Load Subtitles" className="hover:scale-110 transition-transform">
                                    <span className="w-6 h-6 block">{ICONS.subtitles}</span>
                                </button>
                                <button onClick={() => changeSpeed(0.25)} title={`Speed: ${playbackRate}x`} className="hover:scale-110 transition-transform flex items-center gap-1 font-bold">
                                    <span className="w-6 h-6 block">{ICONS.speed}</span> <span className="text-xs">{playbackRate}x</span>
                                </button>
                                <button onClick={toggleFullscreen} className="hover:scale-110 transition-transform ml-2">
                                    <span className="w-7 h-7 block">{ICONS.fullscreen}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            // State
            const [playlists, setPlaylists] = useState(() => {
                const saved = localStorage.getItem('flametv_playlists');
                return saved ? JSON.parse(saved) : [];
            });
            const [localMedia, setLocalMedia] = useState([]);
            const [favorites, setFavorites] = useState(() => {
                const saved = localStorage.getItem('flametv_favorites');
                return saved ? JSON.parse(saved) : [];
            });
            const [hiddenChannels, setHiddenChannels] = useState(() => {
                const saved = localStorage.getItem('flametv_hidden');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [searchQuery, setSearchQuery] = useState('');
            const [playingChannel, setPlayingChannel] = useState(null);
            
            // UI State
            const [catIdx, setCatIdx] = useState(1); // Default to Home
            const [itemIdx, setItemIdx] = useState(0);
            
            // Modals
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isSearchModalOpen, setIsSearchModalOpen] = useState(false);
            
            // Persist
            useEffect(() => localStorage.setItem('flametv_playlists', JSON.stringify(playlists)), [playlists]);
            useEffect(() => localStorage.setItem('flametv_favorites', JSON.stringify(favorites)), [favorites]);
            useEffect(() => localStorage.setItem('flametv_hidden', JSON.stringify(hiddenChannels)), [hiddenChannels]);

            // Hidden File Inputs for Local Media
            const fileInputRef = useRef(null);
            const folderInputRef = useRef(null);

            const handleLocalFilesChange = (e) => {
                const files = Array.from(e.target.files);
                
                // Segregate media from subtitles
                const mediaFiles = files.filter(f => {
                    const nameLower = f.name.toLowerCase();
                    return f.type.startsWith('video/') || nameLower.endsWith('.mkv') || nameLower.endsWith('.mp4') || nameLower.endsWith('.webm');
                });
                
                const subFiles = files.filter(f => {
                    const nameLower = f.name.toLowerCase();
                    return nameLower.endsWith('.srt') || nameLower.endsWith('.vtt');
                });
                
                if (mediaFiles.length === 0) return;

                const newMedia = mediaFiles.map(f => {
                    // Match exact basename between video and sub files
                    const baseName = f.name.substring(0, f.name.lastIndexOf('.')) || f.name;
                    const matchedSub = subFiles.find(sub => {
                        const subBaseName = sub.name.substring(0, sub.name.lastIndexOf('.')) || sub.name;
                        return subBaseName === baseName;
                    });

                    return {
                        id: genId(),
                        name: f.name,
                        url: URL.createObjectURL(f), 
                        group: 'Local Media',
                        isLocal: true,
                        pendingSubFile: matchedSub || null
                    };
                });
                
                setLocalMedia(prev => [...prev, ...newMedia]);
                
                const localCatIndex = categories.findIndex(c => c.id === 'local');
                if (localCatIndex !== -1) {
                    setCatIdx(localCatIndex);
                    setItemIdx(2); 
                }
            };

            // Build Categories Dynamic Array
            const categories = useMemo(() => {
                let cats = [];

                // 1. Search
                let searchResults = [];
                if (searchQuery) {
                    const allChannels = playlists.flatMap(p => p.channels).filter(c => !hiddenChannels.includes(c.id));
                    const q = searchQuery.toLowerCase();
                    searchResults = allChannels.filter(c => c.name.toLowerCase().includes(q));
                }
                cats.push({
                    id: 'search', title: 'Search', icon: ICONS.search,
                    items: [
                        { name: 'Enter Search Query', desc: searchQuery ? `Current: "${searchQuery}"` : 'Press Enter to search', action: 'OPEN_SEARCH' },
                        ...(searchQuery ? searchResults.map(c => ({ ...c, desc: c.group, icon: ICONS.play, action: 'PLAY' })) : 
                        [{ name: 'No results', desc: 'Type to find channels', icon: ICONS.search, action: 'NONE' }])
                    ]
                });

                // 2. Home (All channels flat, excluding hidden)
                const allHome = playlists.flatMap(p => p.channels).filter(c => !hiddenChannels.includes(c.id)).slice(0, 150);
                cats.push({
                    id: 'home', title: 'Home', icon: ICONS.home,
                    items: allHome.length > 0 
                        ? allHome.map(c => ({ ...c, desc: c.group, icon: ICONS.play, action: 'PLAY' }))
                        : [{ name: 'No channels', desc: 'Go to Add Content to load an M3U', icon: ICONS.gear, action: 'NONE' }]
                });

                // 3. Favorites (excluding hidden)
                const favChannels = playlists.flatMap(p => p.channels).filter(c => favorites.includes(c.id) && !hiddenChannels.includes(c.id));
                cats.push({
                    id: 'favorites', title: 'Favorites', icon: ICONS.star,
                    items: favChannels.length > 0
                        ? favChannels.map(c => ({ ...c, desc: 'Favorite Stream', icon: ICONS.star, action: 'PLAY' }))
                        : [{ name: 'No Favorites', desc: 'Press F during playback to favorite', icon: ICONS.star, action: 'NONE' }]
                });

                // 4. Playlists (excluding hidden)
                playlists.forEach(pl => {
                    const visibleChannels = pl.channels.filter(c => !hiddenChannels.includes(c.id));
                    cats.push({
                        id: pl.id, title: pl.name, icon: ICONS.list,
                        items: visibleChannels.length > 0 
                            ? visibleChannels.map(c => ({ ...c, desc: c.group, icon: ICONS.play, action: 'PLAY' }))
                            : [{ name: 'No visible channels', desc: 'All channels might be hidden', icon: ICONS.list, action: 'NONE' }]
                    });
                });

                // 5. Local Media
                cats.push({
                    id: 'local', title: 'Local Media', icon: ICONS.folder,
                    items: [
                        { name: 'Open File(s)', desc: 'Select video files from your device', icon: ICONS.fileVideo, action: 'OPEN_FILE' },
                        { name: 'Open Folder', desc: 'Load a directory of videos', icon: ICONS.folder, action: 'OPEN_FOLDER' },
                        ...localMedia.map(m => ({ ...m, desc: 'Local File', icon: ICONS.play, action: 'PLAY' }))
                    ]
                });

                // 6. Hidden Channels
                const hiddenItems = playlists.flatMap(p => p.channels).filter(c => hiddenChannels.includes(c.id));
                cats.push({
                    id: 'hidden', title: 'Hidden Channels', icon: ICONS.eyeOff,
                    items: hiddenItems.length > 0
                        ? hiddenItems.map(c => ({ ...c, desc: 'Hidden Stream', icon: ICONS.eyeOff, action: 'PLAY' }))
                        : [{ name: 'No Hidden Channels', desc: 'Press Del during playback to hide', icon: ICONS.eyeOff, action: 'NONE' }]
                });

                // 7. Add Content
                cats.push({
                    id: 'add', title: 'Add Content', icon: ICONS.plus,
                    items: [
                        { name: 'Import M3U Playlist', desc: 'Load channels via URL or Raw Text', icon: ICONS.plus, action: 'OPEN_ADD_MODAL' }
                    ]
                });

                // 8. Settings
                cats.push({
                    id: 'settings', title: 'Settings', icon: ICONS.gear,
                    items: [
                        { name: 'Clear All Playlists', desc: 'Remove all M3U data', icon: ICONS.trash, action: 'CLEAR_PL' },
                        { name: 'Clear Favorites', desc: 'Reset favorites list', icon: ICONS.trash, action: 'CLEAR_FAV' }
                    ]
                });

                return cats;
            }, [playlists, favorites, searchQuery, localMedia, hiddenChannels]);

            // Track Playable Channel Navigation
            const getNextChannel = useCallback(() => {
                const currentList = categories[catIdx].items.filter(i => i.action === 'PLAY');
                if (currentList.length === 0) return null;
                const idx = currentList.findIndex(i => i.id === playingChannel?.id);
                if (idx !== -1 && idx < currentList.length - 1) return currentList[idx + 1];
                return currentList[0]; // Wrap around
            }, [categories, catIdx, playingChannel]);

            const getPrevChannel = useCallback(() => {
                const currentList = categories[catIdx].items.filter(i => i.action === 'PLAY');
                if (currentList.length === 0) return null;
                const idx = currentList.findIndex(i => i.id === playingChannel?.id);
                if (idx > 0) return currentList[idx - 1];
                return currentList[currentList.length - 1]; // Wrap around
            }, [categories, catIdx, playingChannel]);

            // Keyboard Navigation Logic
            useEffect(() => {
                if (playingChannel || isAddModalOpen || isSearchModalOpen) return;

                const handleKeyDown = (e) => {
                    switch (e.key) {
                        case 'ArrowRight':
                            if (catIdx < categories.length - 1) { setCatIdx(catIdx + 1); setItemIdx(0); }
                            break;
                        case 'ArrowLeft':
                            if (catIdx > 0) { setCatIdx(catIdx - 1); setItemIdx(0); }
                            break;
                        case 'ArrowDown':
                            if (itemIdx < categories[catIdx].items.length - 1) setItemIdx(itemIdx + 1); 
                            break;
                        case 'ArrowUp':
                            if (itemIdx > 0) setItemIdx(itemIdx - 1); 
                            break;
                        case 'Enter':
                        case ' ':
                            const selectedItem = categories[catIdx].items[itemIdx];
                            if (selectedItem.action === 'PLAY') {
                                setPlayingChannel(selectedItem);
                            } else if (selectedItem.action === 'OPEN_ADD_MODAL') {
                                setIsAddModalOpen(true);
                            } else if (selectedItem.action === 'OPEN_SEARCH') {
                                setIsSearchModalOpen(true);
                            } else if (selectedItem.action === 'CLEAR_PL') {
                                setPlaylists([]); setItemIdx(0);
                            } else if (selectedItem.action === 'CLEAR_FAV') {
                                setFavorites([]);
                            } else if (selectedItem.action === 'OPEN_FILE') {
                                fileInputRef.current?.click();
                            } else if (selectedItem.action === 'OPEN_FOLDER') {
                                folderInputRef.current?.click();
                            }
                            break;
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [categories, playingChannel, isAddModalOpen, isSearchModalOpen, catIdx, itemIdx]);

            // Action Handlers for IPTVPlayerView
            const handleFavToggle = () => {
                if (playingChannel && !playingChannel.isLocal) {
                    setFavorites(prev => prev.includes(playingChannel.id) ? prev.filter(id => id !== playingChannel.id) : [...prev, playingChannel.id]);
                }
            };

            const handleHideToggle = () => {
                if (playingChannel && !playingChannel.isLocal) {
                    const isCurrentlyHidden = hiddenChannels.includes(playingChannel.id);
                    if (isCurrentlyHidden) {
                        setHiddenChannels(prev => prev.filter(id => id !== playingChannel.id));
                    } else {
                        const nextChan = getNextChannel();
                        setHiddenChannels(prev => [...prev, playingChannel.id]);
                        if (nextChan && nextChan.id !== playingChannel.id) setPlayingChannel(nextChan);
                        else setPlayingChannel(null);
                    }
                }
            };

            // Sub-Components
            const AddPlaylistModal = () => {
                const [name, setName] = useState('');
                const [content, setContent] = useState('');
                const [error, setError] = useState('');

                const handleSubmit = async () => {
                    if (!name || !content) { setError('Please fill all fields.'); return; }
                    let m3uText = content;
                    
                    if (content.trim().startsWith('http')) {
                        try {
                            const res = await fetch(content.trim());
                            if (!res.ok) throw new Error('Fetch failed');
                            m3uText = await res.text();
                        } catch (err) {
                            setError('Failed to fetch URL. CORS or invalid link.'); return;
                        }
                    }

                    const parsed = parseM3U(m3uText);
                    if (parsed.length === 0) { setError('No valid channels found in M3U.'); return; }

                    setPlaylists(prev => [...prev, { id: genId(), name, channels: parsed }]);
                    setIsAddModalOpen(false);
                    
                    setCatIdx(categories.findIndex(c => c.id === 'add') - 1);
                    setItemIdx(0);
                };

                return (
                    <div className="modal-overlay" onClick={() => setIsAddModalOpen(false)}>
                        <div className="modal-content" onClick={e => e.stopPropagation()}>
                            <h2 className="text-2xl font-bold text-white mb-4">Add M3U Playlist</h2>
                            <p className="text-white/70 mb-2">Playlist Name</p>
                            <input autoFocus className="modal-input" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Sports Streams" />
                            <p className="text-white/70 mb-2">M3U URL or Raw Content</p>
                            <textarea className="modal-input h-32 resize-none" value={content} onChange={e => setContent(e.target.value)} placeholder="https://..." />
                            {error && <p className="text-red-400 mb-4 font-bold">{error}</p>}
                            <div className="flex justify-end gap-4">
                                <button className="px-4 py-2 bg-white/10 text-white rounded hover:bg-white/20" onClick={() => setIsAddModalOpen(false)}>Cancel</button>
                                <button className="px-4 py-2 bg-white text-black font-bold rounded hover:bg-gray-200" onClick={handleSubmit}>Save Playlist</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const SearchModal = () => {
                const [val, setVal] = useState(searchQuery);
                return (
                    <div className="modal-overlay" onClick={() => setIsSearchModalOpen(false)}>
                        <div className="modal-content" onClick={e => e.stopPropagation()}>
                            <h2 className="text-2xl font-bold text-white mb-4">Search Channels</h2>
                            <input 
                                autoFocus className="modal-input" value={val} onChange={e => setVal(e.target.value)} 
                                placeholder="Type channel name..."
                                onKeyDown={e => {
                                    if (e.key === 'Enter') {
                                        setSearchQuery(val);
                                        setIsSearchModalOpen(false);
                                        setItemIdx(1); 
                                    } else if (e.key === 'Escape') {
                                        setIsSearchModalOpen(false);
                                    }
                                }}
                            />
                            <p className="text-white/50 text-sm">Press Enter to search, ESC to cancel.</p>
                        </div>
                    </div>
                );
            };

            const currentCategory = categories[catIdx];

            return (
                <div className="w-full h-full relative">
                    <StatusBar title={currentCategory.title} />

                    <input type="file" ref={fileInputRef} className="hidden" accept="video/*,.mkv,.m3u8,.srt,.vtt" multiple onChange={handleLocalFilesChange} />
                    <input type="file" ref={folderInputRef} className="hidden" accept="video/*,.mkv,.m3u8,.srt,.vtt" webkitdirectory="true" directory="true" multiple onChange={handleLocalFilesChange} />

                    <div className="xmb-container">
                        <div className="main-menu" style={{ transform: `translateX(${catIdx * -90}px)` }}>
                            {categories.map((cat, idx) => (
                                <div key={cat.id} className={`menu-category ${idx === catIdx ? 'active' : ''}`}>
                                    {cat.icon}
                                </div>
                            ))}
                        </div>

                        <div className="sub-menu" style={{ transform: `translateY(${itemIdx * -65}px)` }}>
                            {currentCategory.items.map((item, idx) => (
                                <div key={idx} className={`menu-item ${idx === itemIdx ? 'active' : ''}`}>
                                    <div className="item-icon">{item.icon || ICONS.gear}</div>
                                    <div className="item-text-container">
                                        <div className="item-title">{item.name}</div>
                                        <div className="item-desc">{item.desc}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {isAddModalOpen && <AddPlaylistModal />}
                    {isSearchModalOpen && <SearchModal />}
                    
                    {playingChannel && (
                        playingChannel.isLocal ? (
                            <LocalPlayerView 
                                channel={playingChannel} 
                                onBack={() => setPlayingChannel(null)}
                            />
                        ) : (
                            <IPTVPlayerView 
                                channel={playingChannel} 
                                onBack={() => setPlayingChannel(null)}
                                onNext={() => setPlayingChannel(getNextChannel() || playingChannel)}
                                onPrev={() => setPlayingChannel(getPrevChannel() || playingChannel)}
                                onFavToggle={handleFavToggle}
                                onHideToggle={handleHideToggle}
                                isFav={favorites.includes(playingChannel.id)}
                                isHidden={hiddenChannels.includes(playingChannel.id)}
                            />
                        )
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
