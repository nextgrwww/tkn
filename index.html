<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKN Media Player</title>
    
    <!-- PWA & Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>

    <style>
        /* Exact Typography to match RetroArch's default XMB font */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap');

        :root {
            --ra-blue-light: #0072ff;
            --ra-blue-dark: #001e5c;
            --text-color: #ffffff;
            --transition-speed: 0.25s;
            --origin-x: 25vw;
            --origin-y: 28vh;
            --cat-spacing: 90px;
            --item-spacing: 65px;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(120% 120% at 50% 0%, var(--ra-blue-light) 0%, var(--ra-blue-dark) 100%);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Top & Bottom Bars --- */
        .header-top-left { position: absolute; top: 30px; left: 40px; font-size: 1.4rem; letter-spacing: 0.5px; z-index: 10; }
        .header-top-right { position: absolute; top: 30px; right: 40px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; opacity: 0.9; z-index: 10; }
        .footer-bottom-left { position: absolute; bottom: 30px; left: 40px; font-size: 1rem; opacity: 0.8; z-index: 10; }

        /* --- XMB Layout System --- */
        .xmb-container { position: relative; height: 100vh; width: 100vw; overflow: hidden; }

        /* Horizontal Category Menu */
        .main-menu {
            position: absolute;
            top: var(--origin-y);
            left: var(--origin-x);
            display: flex;
            align-items: center;
            transition: transform var(--transition-speed) cubic-bezier(0.2, 0, 0.2, 1);
        }

        .menu-category {
            width: 64px; height: 64px;
            margin-right: calc(var(--cat-spacing) - 64px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0.7;
            transition: all var(--transition-speed) ease;
            transform-origin: center;
            border-radius: 18px; /* Squircle */
        }

        .menu-category svg {
            width: 32px; height: 32px;
            stroke: #fff; stroke-width: 1.5;
            transition: stroke var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        .menu-category.active {
            opacity: 1; background-color: #ffffff;
            transform: scale(1.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .menu-category.active svg { stroke: var(--ra-blue-light); stroke-width: 2; }

        /* Vertical Item Menu */
        .sub-menu {
            position: absolute;
            top: calc(var(--origin-y) + 110px);
            left: calc(var(--origin-x) - 10px);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed) cubic-bezier(0.2, 0, 0.2, 1);
        }

        .menu-item {
            height: var(--item-spacing);
            display: flex; align-items: flex-start; gap: 15px;
            opacity: 0.6; transition: all var(--transition-speed) ease;
            white-space: nowrap;
        }

        .menu-item.active { opacity: 1; }

        .item-icon { width: 24px; height: 24px; margin-top: 2px; }
        .item-icon svg { width: 100%; height: 100%; stroke: #fff; stroke-width: 1.5; }

        .item-text-container { display: flex; flex-direction: column; }
        .item-title { font-size: 1.3rem; letter-spacing: 0.5px; transition: font-size var(--transition-speed) ease; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .menu-item.active .item-title { font-size: 1.45rem; font-weight: 400; }

        .item-desc {
            font-size: 0.9rem; opacity: 0; max-height: 0; overflow: hidden;
            margin-top: 5px; color: rgba(255, 255, 255, 0.8);
            transition: opacity var(--transition-speed) ease;
        }
        .menu-item.active .item-desc { opacity: 1; max-height: 50px; }

        /* Modal Overlays */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--ra-blue-light) 0%, var(--ra-blue-dark) 100%);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px; border-radius: 12px; width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .modal-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 15px; border-radius: 6px; margin-top: 8px; margin-bottom: 20px;
            font-family: inherit; font-size: 1rem; outline: none;
        }
        .modal-input:focus { border-color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- TKN Media Player Logic & Utils ---
        const genId = () => Math.random().toString(36).substring(2, 9) + Date.now().toString(36);

        const parseM3U = (text) => {
            const lines = text.split(/\r?\n/);
            const channels = [];
            let currentChannel = null;
            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                if (line.startsWith('#EXTINF:')) {
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    const nameParts = line.split(',');
                    const nameMatch = nameParts[nameParts.length - 1];
                    currentChannel = {
                        id: genId(),
                        name: nameMatch ? nameMatch.trim() : 'Unknown Channel',
                        group: groupMatch ? groupMatch[1] : 'Uncategorized',
                    };
                } else if (!line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            });
            return channels;
        };

        // --- ICONS (RetroArch Style SVG Outlines) ---
        const ICONS = {
            search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            star: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            folder: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
            list: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" strokeDasharray="3 3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            gear: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-2.82.11 1.65 1.65 0 0 0-.11 2.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1.15-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1.15H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1.15z"/></svg>,
            play: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            fileVideo: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m10 11 5 3-5 3v-6z"/></svg>,
            trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        };

        // --- Status Bar Component ---
        const StatusBar = ({ title }) => {
            const [time, setTime] = useState('');
            const [battery, setBattery] = useState('100%');

            useEffect(() => {
                const updateTime = () => {
                    const now = new Date();
                    const day = String(now.getDate()).padStart(2, '0');
                    const month = String(now.getMonth() + 1).padStart(2, '0');
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    setTime(`${day}/${month} ${hours}:${minutes}`);
                };
                updateTime();
                const timer = setInterval(updateTime, 60000);

                if (navigator.getBattery) {
                    navigator.getBattery().then(batt => {
                        const updateBatt = () => setBattery(`${Math.round(batt.level * 100)}%`);
                        updateBatt();
                        batt.addEventListener('levelchange', updateBatt);
                    });
                }
                return () => clearInterval(timer);
            }, []);

            return (
                <>
                    <div className="header-top-left">{title}</div>
                    <div className="header-top-right">
                        <span>{time}</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <span style={{marginLeft: '5px'}}>{battery}</span>
                        <svg width="14" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="6" y="4" width="12" height="16" rx="2" ry="2"></rect><line x1="10" y1="2" x2="14" y2="2"></line><line x1="12" y1="9" x2="12" y2="15"></line></svg>
                    </div>
                    <div className="footer-bottom-left">TKN Media Player - RetroArch Edition</div>
                </>
            );
        };

        // --- Video Player Component ---
        const PlayerView = ({ channel, onBack }) => {
            const videoRef = useRef(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                let hls;
                if (!videoRef.current) return;

                const startPlayback = () => {
                    if (window.Hls.isSupported() && !channel.isLocal) {
                        hls = new window.Hls();
                        hls.loadSource(channel.url);
                        hls.attachMedia(videoRef.current);
                        hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
                            setLoading(false);
                            // Safety check: Ensure videoRef is still mounted before playing
                            if (videoRef.current) {
                                videoRef.current.play().catch(e => console.warn('Playback prevented:', e));
                            }
                        });
                    } else if (videoRef.current.canPlayType('application/vnd.apple.mpegurl') || channel.isLocal) {
                        videoRef.current.src = channel.url;
                        videoRef.current.addEventListener('loadedmetadata', () => {
                            setLoading(false);
                            // Safety check: Ensure videoRef is still mounted before playing
                            if (videoRef.current) {
                                videoRef.current.play().catch(e => console.warn('Playback prevented:', e));
                            }
                        });
                    }
                };

                startPlayback();
                return () => { if (hls) hls.destroy(); };
            }, [channel]);

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Escape' || e.key === 'Backspace' || e.key === 'b') {
                        onBack();
                    } else if (e.key === ' ' || e.key === 'Enter') {
                        // Added safety checks here to ensure videoRef.current exists
                        if (videoRef.current && videoRef.current.paused) {
                            videoRef.current.play().catch(err => console.warn('Playback error:', err));
                        } else if (videoRef.current) {
                            videoRef.current.pause();
                        }
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [onBack]);

            return (
                <div className="fixed inset-0 bg-black z-[100] flex flex-col">
                    {loading && <div className="absolute inset-0 flex items-center justify-center text-white z-50">Buffering...</div>}
                    <video ref={videoRef} className="w-full h-full object-contain" controls autoPlay />
                    <div className="absolute bottom-10 left-10 text-white z-[110] bg-black/60 p-5 rounded-xl backdrop-blur-sm border border-white/10 pointer-events-none transition-opacity">
                        <h2 className="text-2xl font-light mb-1">{channel.name}</h2>
                        <p className="text-sm opacity-70">Press 'ESC' or 'B' to return to menu</p>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            // State
            const [playlists, setPlaylists] = useState(() => {
                const saved = localStorage.getItem('flametv_playlists');
                return saved ? JSON.parse(saved) : [];
            });
            const [localMedia, setLocalMedia] = useState([]);
            const [favorites, setFavorites] = useState(() => {
                const saved = localStorage.getItem('flametv_favorites');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [searchQuery, setSearchQuery] = useState('');
            const [playingChannel, setPlayingChannel] = useState(null);
            
            // UI State
            const [catIdx, setCatIdx] = useState(1); // Default to Home
            const [itemIdx, setItemIdx] = useState(0);
            
            // Modals
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isSearchModalOpen, setIsSearchModalOpen] = useState(false);
            
            // Persist
            useEffect(() => localStorage.setItem('flametv_playlists', JSON.stringify(playlists)), [playlists]);
            useEffect(() => localStorage.setItem('flametv_favorites', JSON.stringify(favorites)), [favorites]);

            // Hidden File Inputs for Local Media
            const fileInputRef = useRef(null);
            const folderInputRef = useRef(null);

            const handleLocalFilesChange = (e) => {
                const files = Array.from(e.target.files).filter(f => 
                    f.type.startsWith('video/') || f.name.endsWith('.mkv') || f.name.endsWith('.mp4') || f.name.endsWith('.webm')
                );
                
                if (files.length === 0) return;

                const newMedia = files.map(f => ({
                    id: genId(),
                    name: f.name,
                    url: URL.createObjectURL(f), // Create local blob URL
                    group: 'Local Media',
                    isLocal: true
                }));
                
                setLocalMedia(prev => [...prev, ...newMedia]);
                
                // Switch focus to Local Media category
                const localCatIndex = categories.findIndex(c => c.id === 'local');
                if (localCatIndex !== -1) {
                    setCatIdx(localCatIndex);
                    setItemIdx(2); // Focus the first newly added item (offset by the 2 static buttons)
                }
            };

            // Build Categories Dynamic Array
            const categories = useMemo(() => {
                let cats = [];

                // 1. Search
                let searchResults = [];
                if (searchQuery) {
                    const allChannels = playlists.flatMap(p => p.channels);
                    const q = searchQuery.toLowerCase();
                    searchResults = allChannels.filter(c => c.name.toLowerCase().includes(q));
                }
                cats.push({
                    id: 'search', title: 'Search', icon: ICONS.search,
                    items: [
                        { name: 'Enter Search Query', desc: searchQuery ? `Current: "${searchQuery}"` : 'Press Enter to search', action: 'OPEN_SEARCH' },
                        ...(searchQuery ? searchResults.map(c => ({ ...c, desc: c.group, icon: ICONS.play, action: 'PLAY' })) : 
                        [{ name: 'No results', desc: 'Type to find channels', icon: ICONS.search, action: 'NONE' }])
                    ]
                });

                // 2. Home (All channels flat)
                const allHome = playlists.flatMap(p => p.channels).slice(0, 100); // Limit to 100 for performance
                cats.push({
                    id: 'home', title: 'Home', icon: ICONS.home,
                    items: allHome.length > 0 
                        ? allHome.map(c => ({ ...c, desc: c.group, icon: ICONS.play, action: 'PLAY' }))
                        : [{ name: 'No channels', desc: 'Go to Add Content to load an M3U', icon: ICONS.gear, action: 'NONE' }]
                });

                // 3. Favorites
                const favChannels = playlists.flatMap(p => p.channels).filter(c => favorites.includes(c.id));
                cats.push({
                    id: 'favorites', title: 'Favorites', icon: ICONS.star,
                    items: favChannels.length > 0
                        ? favChannels.map(c => ({ ...c, desc: 'Favorite Stream', icon: ICONS.star, action: 'PLAY' }))
                        : [{ name: 'No Favorites', desc: 'Press F during playback to favorite', icon: ICONS.star, action: 'NONE' }]
                });

                // 4. Playlists
                playlists.forEach(pl => {
                    cats.push({
                        id: pl.id, title: pl.name, icon: ICONS.list,
                        items: pl.channels.map(c => ({ ...c, desc: c.group, icon: ICONS.play, action: 'PLAY' }))
                    });
                });

                // 5. Local Media
                cats.push({
                    id: 'local', title: 'Local Media', icon: ICONS.folder,
                    items: [
                        { name: 'Open File(s)', desc: 'Select video files from your device', icon: ICONS.fileVideo, action: 'OPEN_FILE' },
                        { name: 'Open Folder', desc: 'Load a directory of videos', icon: ICONS.folder, action: 'OPEN_FOLDER' },
                        ...localMedia.map(m => ({ ...m, desc: 'Local File', icon: ICONS.play, action: 'PLAY' }))
                    ]
                });

                // 6. Add Content
                cats.push({
                    id: 'add', title: 'Add Content', icon: ICONS.plus,
                    items: [
                        { name: 'Import M3U Playlist', desc: 'Load channels via URL or Raw Text', icon: ICONS.plus, action: 'OPEN_ADD_MODAL' }
                    ]
                });

                // 7. Settings
                cats.push({
                    id: 'settings', title: 'Settings', icon: ICONS.gear,
                    items: [
                        { name: 'Clear All Playlists', desc: 'Remove all M3U data', icon: ICONS.trash, action: 'CLEAR_PL' },
                        { name: 'Clear Favorites', desc: 'Reset favorites list', icon: ICONS.trash, action: 'CLEAR_FAV' }
                    ]
                });

                return cats;
            }, [playlists, favorites, searchQuery, localMedia]);

            // Keyboard Navigation Logic
            useEffect(() => {
                if (playingChannel || isAddModalOpen || isSearchModalOpen) return;

                const handleKeyDown = (e) => {
                    switch (e.key) {
                        case 'ArrowRight':
                            if (catIdx < categories.length - 1) { 
                                setCatIdx(catIdx + 1); 
                                setItemIdx(0); 
                            }
                            break;
                        case 'ArrowLeft':
                            if (catIdx > 0) { 
                                setCatIdx(catIdx - 1); 
                                setItemIdx(0); 
                            }
                            break;
                        case 'ArrowDown':
                            if (itemIdx < categories[catIdx].items.length - 1) { 
                                setItemIdx(itemIdx + 1); 
                            }
                            break;
                        case 'ArrowUp':
                            if (itemIdx > 0) { 
                                setItemIdx(itemIdx - 1); 
                            }
                            break;
                        case 'Enter':
                        case ' ':
                            const selectedItem = categories[catIdx].items[itemIdx];
                            if (selectedItem.action === 'PLAY') {
                                setPlayingChannel(selectedItem);
                            } else if (selectedItem.action === 'OPEN_ADD_MODAL') {
                                setIsAddModalOpen(true);
                            } else if (selectedItem.action === 'OPEN_SEARCH') {
                                setIsSearchModalOpen(true);
                            } else if (selectedItem.action === 'CLEAR_PL') {
                                setPlaylists([]); setItemIdx(0);
                            } else if (selectedItem.action === 'CLEAR_FAV') {
                                setFavorites([]);
                            } else if (selectedItem.action === 'OPEN_FILE') {
                                fileInputRef.current?.click();
                            } else if (selectedItem.action === 'OPEN_FOLDER') {
                                folderInputRef.current?.click();
                            }
                            break;
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [categories, playingChannel, isAddModalOpen, isSearchModalOpen, catIdx, itemIdx]);

            // Favorite Toggle inside player
            useEffect(() => {
                if (!playingChannel) return;
                const handleFavKey = (e) => {
                    if (e.key.toLowerCase() === 'f' && !playingChannel.isLocal) {
                        setFavorites(prev => 
                            prev.includes(playingChannel.id) 
                            ? prev.filter(id => id !== playingChannel.id) 
                            : [...prev, playingChannel.id]
                        );
                    }
                };
                window.addEventListener('keydown', handleFavKey);
                return () => window.removeEventListener('keydown', handleFavKey);
            }, [playingChannel]);

            // Sub-Components
            const AddPlaylistModal = () => {
                const [name, setName] = useState('');
                const [content, setContent] = useState('');
                const [error, setError] = useState('');

                const handleSubmit = async () => {
                    if (!name || !content) { setError('Please fill all fields.'); return; }
                    let m3uText = content;
                    
                    if (content.trim().startsWith('http')) {
                        try {
                            const res = await fetch(content.trim());
                            if (!res.ok) throw new Error('Fetch failed');
                            m3uText = await res.text();
                        } catch (err) {
                            setError('Failed to fetch URL. CORS or invalid link.'); return;
                        }
                    }

                    const parsed = parseM3U(m3uText);
                    if (parsed.length === 0) { setError('No valid channels found in M3U.'); return; }

                    setPlaylists(prev => [...prev, { id: genId(), name, channels: parsed }]);
                    setIsAddModalOpen(false);
                    
                    // Navigate to the newly added playlist
                    setCatIdx(categories.findIndex(c => c.id === 'add') - 1); // rough approx
                    setItemIdx(0);
                };

                return (
                    <div className="modal-overlay" onClick={() => setIsAddModalOpen(false)}>
                        <div className="modal-content" onClick={e => e.stopPropagation()}>
                            <h2 className="text-2xl font-bold text-white mb-4">Add M3U Playlist</h2>
                            <p className="text-white/70 mb-2">Playlist Name</p>
                            <input autoFocus className="modal-input" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Sports Streams" />
                            <p className="text-white/70 mb-2">M3U URL or Raw Content</p>
                            <textarea className="modal-input h-32 resize-none" value={content} onChange={e => setContent(e.target.value)} placeholder="https://..." />
                            {error && <p className="text-red-400 mb-4 font-bold">{error}</p>}
                            <div className="flex justify-end gap-4">
                                <button className="px-4 py-2 bg-white/10 text-white rounded hover:bg-white/20" onClick={() => setIsAddModalOpen(false)}>Cancel</button>
                                <button className="px-4 py-2 bg-white text-black font-bold rounded hover:bg-gray-200" onClick={handleSubmit}>Save Playlist</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const SearchModal = () => {
                const [val, setVal] = useState(searchQuery);
                return (
                    <div className="modal-overlay" onClick={() => setIsSearchModalOpen(false)}>
                        <div className="modal-content" onClick={e => e.stopPropagation()}>
                            <h2 className="text-2xl font-bold text-white mb-4">Search Channels</h2>
                            <input 
                                autoFocus className="modal-input" value={val} onChange={e => setVal(e.target.value)} 
                                placeholder="Type channel name..."
                                onKeyDown={e => {
                                    if (e.key === 'Enter') {
                                        setSearchQuery(val);
                                        setIsSearchModalOpen(false);
                                        setItemIdx(1); // Drop down to first result
                                    } else if (e.key === 'Escape') {
                                        setIsSearchModalOpen(false);
                                    }
                                }}
                            />
                            <p className="text-white/50 text-sm">Press Enter to search, ESC to cancel.</p>
                        </div>
                    </div>
                );
            };

            const currentCategory = categories[catIdx];

            return (
                <div className="w-full h-full relative">
                    <StatusBar title={currentCategory.title} />

                    {/* Hidden Inputs for Local Media */}
                    <input type="file" ref={fileInputRef} className="hidden" accept="video/*,.mkv,.m3u8" multiple onChange={handleLocalFilesChange} />
                    <input type="file" ref={folderInputRef} className="hidden" accept="video/*,.mkv,.m3u8" webkitdirectory="true" directory="true" multiple onChange={handleLocalFilesChange} />

                    <div className="xmb-container">
                        {/* Horizontal Categories */}
                        <div className="main-menu" style={{ transform: `translateX(${catIdx * -90}px)` }}>
                            {categories.map((cat, idx) => (
                                <div key={cat.id} className={`menu-category ${idx === catIdx ? 'active' : ''}`}>
                                    {cat.icon}
                                </div>
                            ))}
                        </div>

                        {/* Vertical Items */}
                        <div className="sub-menu" style={{ transform: `translateY(${itemIdx * -65}px)` }}>
                            {currentCategory.items.map((item, idx) => (
                                <div key={idx} className={`menu-item ${idx === itemIdx ? 'active' : ''}`}>
                                    <div className="item-icon">{item.icon || ICONS.gear}</div>
                                    <div className="item-text-container">
                                        <div className="item-title">{item.name}</div>
                                        <div className="item-desc">{item.desc}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {isAddModalOpen && <AddPlaylistModal />}
                    {isSearchModalOpen && <SearchModal />}
                    {playingChannel && <PlayerView channel={playingChannel} onBack={() => setPlayingChannel(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
